version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    # No host port exposed for MySQL to avoid conflicts; services use internal Docker network
    volumes:
      - db_data:/var/lib/mysql
    # Healthcheck para verificar que MySQL esté listo
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    # Setup BD automáticamente y luego inicia la app
    command: sh -c "chmod +x backend/db/setup_db.sh && ./backend/db/setup_db.sh && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: db
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
